<!DOCTYPE html>

<!--All code is property of @paul-eric-git-->

<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body> 
        <main>

            <!--Visual component of the calculator-->

            <section id="calculator">
                <h1>calculator_v1</h1>
                <section>
                    <div id="display" style="width: 330px; background-color: rgb(137, 137, 137); color: rgb(255, 255, 255); border-radius: 5%;">@paul-eric-git </div>
                    <div id="equals" class="btn" onclick="press('=')" style="background-color: rgb(0, 145, 255);">=</div>
                </section>
                <section>
                    <div id="one" class="btn" onclick="press('1')">1</div>
                    <div id="two" class="btn" onclick="press('2')">2</div>
                    <div id="three" class="btn" onclick="press('3')">3</div>
                    <div id="divide" class="btn" onclick="press('/')" style="background-color: blue;">/</div>
                </section>
                <section>
                    <div id="four" class="btn" onclick="press('4')">4</div>
                    <div id="five" class="btn" onclick="press('5')">5</div>
                    <div id="six" class="btn" onclick="press('6')">6</div>
                    <div id="multiply" class="btn" onclick="press('*')" style="background-color: blue;">*</div>
                </section>
                <section>
                    <div id="seven" class="btn" onclick="press('7')">7</div>
                    <div id="eight" class="btn" onclick="press('8')">8</div>
                    <div id="nine" class="btn" onclick="press('9')">9</div>
                    <div id="subtract" class="btn" onclick="press('-')" style="background-color: blue;">-</div>
                </section>
                <section>
                    <div id="clear" class="btn" onclick="press('C')" style="background-color: #fd1010">C</div>
                    <div id="zero" class="btn" onclick="press('0')">0</div>
                    <div id="decimal" class="btn" onclick="press('.')">.</div>
                    <div id="plus" class="btn" onclick="press('+')" style="background-color: blue;">+</div>
                </section>
            </section>
        </main>
        <script>

            <!--JavaScript functionality for the calculator-->

            let input = '';

            function press(value) {
                if (value === '='){
                    input = calculate(input);
                } else if (value === '+' || value === '-' || value === '*' || value === '/') {
                    input += ' ' + value + ' ';
                } else if (value === 'C') {
                    input = '';
                } else {
                    input += value;
                }
                document.getElementById('display').textContent = input;
            }

            function calculate(input) {
                input = input.replace(' ', '');
                return eval(input).toFixed(2);
            }
        </script>
    </body>
</html>
